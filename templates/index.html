<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#111111">
  <title>D&D Character</title>
  <script>document.documentElement.setAttribute('data-theme',localStorage.getItem('dnd-theme')||'dark')</script>
  <link rel="stylesheet" href="/static/css/app.css">
</head>
<body>
  <div id="app"></div>
  <script type="module">
    import { renderList, initBuilder, renderSpellLibrary, renderItemLibrary } from '/static/js/builder.js';
    import { initSheet } from '/static/js/sheet.js';

    async function boot() {
      const params = new URLSearchParams(window.location.search);
      const view = params.get('view');
      const id = params.get('id');
      if (view === 'sheet' && id) {
        initSheet(parseInt(id));
      } else if (view === 'new') {
        initBuilder();
      } else if (view === 'spells') {
        renderSpellLibrary();
      } else if (view === 'items') {
        renderItemLibrary();
      } else {
        renderList();
      }
    }

    boot();
  </script>
</body>
</html>
