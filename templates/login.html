<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>D&D Character — Login</title>
  <script>document.documentElement.setAttribute('data-theme',localStorage.getItem('dnd-theme')||'dark')</script>
  <link rel="stylesheet" href="/static/css/app.css">
  <style>
    html, body {
      height: 100%; min-height: 100dvh;
      display: flex; align-items: center; justify-content: center;
      background: var(--bg);
    }
    .login-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 32px 28px;
      width: 340px; max-width: 90vw;
    }
    .login-title {
      font-family: var(--font-display);
      font-size: 22px; font-weight: 500; letter-spacing: 0.04em;
      color: var(--text); margin-bottom: 4px;
    }
    .login-sub {
      font-family: var(--font-body);
      font-size: 13px; color: var(--text-dim); margin-bottom: 24px;
    }
    .field-label {
      font-family: var(--font-display);
      font-size: 0.6rem; color: var(--text-dim); margin-bottom: 5px;
      text-transform: uppercase; letter-spacing: 0.1em;
    }
    .login-input {
      width: 100%; padding: 9px 10px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      background: var(--surface2); color: var(--text);
      font-family: var(--font-body); font-size: 15px;
      margin-bottom: 14px; outline: none;
    }
    .login-input:focus { border-color: var(--text-dim); }
    .login-btn {
      display: block; width: 100%; padding: 10px;
      border-radius: var(--radius-sm); border: none;
      font-family: var(--font-display);
      font-size: 0.75rem; font-weight: 500;
      letter-spacing: 0.1em; text-transform: uppercase;
      cursor: pointer;
      background: var(--text); color: var(--surface);
    }
    .login-btn:hover { opacity: 0.85; }
    .login-error {
      color: #e55; font-family: var(--font-body);
      font-size: 12px; margin-top: 8px; display: none;
    }
  </style>
</head>
<body>
  <div class="login-box">
    <div class="login-title">D&amp;D Character</div>
    <div class="login-sub">Sign in to manage your characters</div>
    <form id="login-form">
      <div class="field-label">Username</div>
      <input class="login-input" id="username" type="text" autocomplete="username" required autofocus>
      <div class="field-label">Password</div>
      <input class="login-input" id="password" type="password" autocomplete="current-password" required>
      <button class="login-btn" type="submit">Sign In</button>
      <div class="login-error" id="error">Invalid credentials</div>
    </form>
  </div>
  <script>
    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const errEl = document.getElementById('error');
      try {
        const res = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password }),
        });
        if (!res.ok) { errEl.style.display = 'block'; return; }
        window.location = '/';
      } catch {
        errEl.style.display = 'block';
      }
    });
  </script>
</body>
</html>
